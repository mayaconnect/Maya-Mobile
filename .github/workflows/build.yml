name: Build Check

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  # Also run on push to main/master so deploy.yml can chain after it
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # ==========================================
  # BUILD ANDROID - Vérification du build
  # ==========================================
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name:  Create .env file for API URL
        run: |
          if [ -z "${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" ]; then
            echo "⚠️ WARNING: EXPO_PUBLIC_API_BASE_URL secret is not set!"
            echo "The app will use the default API URL from the code."
          else
            echo "EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" > .env
            echo "✅ .env file created with API URL"
            # Verify the file was created (without showing the actual URL)
            if [ -f ".env" ]; then
              echo "✅ .env file exists"
              echo "API URL configured: EXPO_PUBLIC_API_BASE_URL=***"
            else
              echo "❌ ERROR: .env file was not created"
              exit 1
            fi
          fi

      - name: 🔨 Generate Android native folder
        run: |
          # Export the variable so it's available during prebuild
          export EXPO_PUBLIC_API_BASE_URL="${{ secrets.EXPO_PUBLIC_API_BASE_URL }}"
          npx expo prebuild --platform android --clean

      - name: 📋 Setup Fastlane configuration
        run: |
          mkdir -p android/fastlane
          cp android-fastlane/Fastfile android/fastlane/Fastfile
          echo "✅ Fastlane configuration copied"

      - name: ☕ Setup JDK 17 + Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 🔧 Set gradlew permissions
        working-directory: android
        run: chmod +x gradlew

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: .

      - name: 🔐 Create dummy keystore for build check
        run: |
          keytool -genkey -v -keystore android/app/dummy.keystore \
            -alias dummy -keyalg RSA -keysize 2048 -validity 1 \
            -storepass dummy123 -keypass dummy123 \
            -dname "CN=DummyBuild, OU=Dev, O=Maya, L=City, S=State, C=US"

      - name: ⚙️ Create gradle.properties for build check
        run: |
          cat << 'EOF' > android/gradle.properties
          MAYA_UPLOAD_STORE_FILE=dummy.keystore
          MAYA_UPLOAD_KEY_ALIAS=dummy
          MAYA_UPLOAD_STORE_PASSWORD=dummy123
          MAYA_UPLOAD_KEY_PASSWORD=dummy123

          # Gradle performance — critical for CI speed
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=true
          org.gradle.configureondemand=true

          # Android settings
          android.useAndroidX=true
          android.enableJetifier=true

          # React Native / Hermes settings
          hermesEnabled=true
          newArchEnabled=true
          EOF

      - name: 🏗️ Build Android APK with Fastlane
        working-directory: android
        run: bundle exec fastlane build_apk

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-build-check
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: ✅ Build successful
        run: echo "✅ Android build completed successfully!"

  # ==========================================
  # BUILD iOS - Vérification du build
  # ==========================================
  build-ios:
    name: 🍎 Build iOS (Check Only)
    runs-on: macos-15  # macOS 15 with Xcode 16.x (required by React Native 0.81)
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Select Xcode 16.1
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version

      - name: 📝 Create .env file for API URL
        run: |
          if [ -z "${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" ]; then
            echo "⚠️ WARNING: EXPO_PUBLIC_API_BASE_URL secret is not set!"
            echo "The app will use the default API URL from the code."
          else
            echo "EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" > .env
            echo "✅ .env file created with API URL"
            # Verify the file was created (without showing the actual URL)
            if [ -f ".env" ]; then
              echo "✅ .env file exists"
              echo "API URL configured: EXPO_PUBLIC_API_BASE_URL=***"
            else
              echo "❌ ERROR: .env file was not created"
              exit 1
            fi
          fi

      - name: 🔨 Generate iOS native folder
        run: |
          # Export the variable so it's available during prebuild
          export EXPO_PUBLIC_API_BASE_URL="${{ secrets.EXPO_PUBLIC_API_BASE_URL }}"
          npx expo prebuild --platform ios --clean

      - name: 🔧 Fix iOS nullability issues (pre-pods)
        run: |
          if [ -f scripts/fix-ios-nullability.sh ]; then
            chmod +x scripts/fix-ios-nullability.sh
            bash scripts/fix-ios-nullability.sh || echo "⚠️ Pre-pods nullability fix had warnings, continuing..."
          else
            echo "⚠️ scripts/fix-ios-nullability.sh not found, skipping"
          fi

      - name: 🔧 Set iOS deployment target in Xcode project
        run: |
          # Find the Xcode project file dynamically
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "📱 Found Xcode project at: $PROJECT_FILE"
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*/IPHONEOS_DEPLOYMENT_TARGET = 13.4/g' "$PROJECT_FILE"
            echo "✅ Set IPHONEOS_DEPLOYMENT_TARGET to 13.4"
            # Verify the change
            echo "🔍 Verification:"
            grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -n 3
          else
            echo "⚠️ Warning: Could not find Xcode project.pbxproj file"
            exit 1
          fi

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 🧹 Clean Xcode Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: 📦 Install xcpretty for clean build output
        run: gem install xcpretty

      - name: 🔧 Configure Podfile build settings
        working-directory: ios
        run: |
          echo "🔧 Adding custom build settings to Podfile post_install hook"

          # Insert custom build settings into the existing post_install hook
          sed -i '' '/post_install do |installer|/a\
          \  # Custom build settings\
          \  installer.pods_project.targets.each do |target|\
          \    target.build_configurations.each do |config|\
          \      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.4"\
          \      config.build_settings["GCC_WARN_INHIBIT_ALL_WARNINGS"] = "YES"\
          \      config.build_settings["SWIFT_SUPPRESS_WARNINGS"] = "YES"\
          \    end\
          \  end\
          ' Podfile

          echo "✅ Podfile configured"

      - name: 📱 Install CocoaPods dependencies
        working-directory: ios
        run: |
          echo "Installing pods"
          pod install --verbose

      - name: 🔧 Fix iOS nullability issues in Pods
        run: |
          if [ -f scripts/fix-ios-nullability.sh ]; then
            chmod +x scripts/fix-ios-nullability.sh
            bash scripts/fix-ios-nullability.sh || echo "⚠️ Post-pods nullability fix had warnings, continuing..."
          fi
          node scripts/fix-react-native-maps-nullability.js || true
          node scripts/fix-react-native-svg-nullability.js || true

      - name: 🔧 Disable Swift 6 strict concurrency checking
        run: |
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "📱 Disabling strict concurrency checking in: $PROJECT_FILE"
            awk '/buildSettings = \{/ {print; print "\t\t\t\tSWIFT_STRICT_CONCURRENCY = minimal;"; next}1' "$PROJECT_FILE" > "$PROJECT_FILE.tmp"
            mv "$PROJECT_FILE.tmp" "$PROJECT_FILE"
            echo "✅ Swift strict concurrency checking disabled"
          fi

      - name: 🔧 Set deployment target for all Pods
        run: |
          cd ios
          echo "Setting IPHONEOS_DEPLOYMENT_TARGET for all Pods to 13.4"
          find Pods -name "project.pbxproj" -type f | while read -r file; do
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*/IPHONEOS_DEPLOYMENT_TARGET = 13.4/g' "$file"
          done
          echo "✅ All Pods deployment targets updated"

      - name: 🔍 List available schemes
        run: |
          cd ios
          # Find the workspace dynamically (expo prebuild names it based on app.json "name")
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 -not -name "project.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "❌ No .xcworkspace found in ios/"
            ls -la
            exit 1
          fi
          echo "📋 Found workspace: $WORKSPACE"
          echo "📋 Available schemes:"
          xcodebuild -list -workspace "$WORKSPACE"

      - name: 🏗️ Build iOS (without signing for check)
        env:
          SKIP_SIMULATOR_AVAILABILITY_CHECK: "1"
        run: |
          cd ios
          # Find the workspace dynamically
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 -not -name "project.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "❌ No .xcworkspace found in ios/"
            exit 1
          fi
          echo "📋 Using workspace: $WORKSPACE"

          # Extract scheme name (workspace basename without extension)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "📋 Using scheme: $SCHEME"

          # Build for iOS device only (avoid simulator runtime issues)
          xcodebuild clean build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            -skipUnavailableActions \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            -allowProvisioningUpdates \
            OTHER_LDFLAGS='$(inherited)' | xcpretty || {
            echo "❌ Build failed"
            exit 1
          }

          echo "✅ Build succeeded"

      - name: ✅ Build successful
        run: echo "✅ iOS build completed successfully!"

  # ==========================================
  # SUMMARY + EMAIL NOTIFICATION
  # ==========================================
  build-summary:
    name: 📊 Build Summary
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📊 Display build results
        run: |
          echo "======================================"
          echo "🔍 BUILD CHECK RESULTS"
          echo "======================================"
          echo ""
          echo "Android Build: ${{ needs.build-android.result }}"
          echo "iOS Build: ${{ needs.build-ios.result }}"
          echo ""
          if [ "${{ needs.build-android.result }}" == "success" ] && [ "${{ needs.build-ios.result }}" == "success" ]; then
            echo "✅ All builds passed!"
          else
            echo "❌ Some builds failed. Check logs above."
          fi

      - name: 📧 Send build notification via Resend
        uses: actions/github-script@v7
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        with:
          script: |
            const https = require('https');

            const androidResult = process.env.ANDROID_RESULT;
            const iosResult = process.env.IOS_RESULT;
            const commitSha = process.env.COMMIT_SHA.substring(0, 7);
            const runId = process.env.RUN_ID;
            const runNumber = process.env.RUN_NUMBER;
            const repo = process.env.REPO;
            const prTitle = process.env.PR_TITLE || 'N/A';
            const prNumber = process.env.PR_NUMBER || '';
            const branch = process.env.BRANCH;
            const actionsUrl = `https://github.com/${repo}/actions/runs/${runId}`;

            const allPassed = androidResult === 'success' && iosResult === 'success';
            const iosIcon = iosResult === 'success' ? '✅' : '❌';
            const androidIcon = androidResult === 'success' ? '✅' : '❌';

            // Devs only — build checks are dev business
            const recipients = [
              'guillaumel1103@gmail.com',
              'lharoti.pro@gmail.com'
            ];

            const headerGradient = allPassed
              ? 'linear-gradient(135deg,#34A853,#0D652D)'
              : 'linear-gradient(135deg,#ff9800,#f44336)';
            const headerEmoji = allPassed ? '✅' : '⚠️';
            const headerTitle = allPassed ? 'Build Check réussi' : 'Build Check échoué';
            const bodyText = allPassed
              ? 'Tous les builds ont réussi pour la PR :'
              : 'Le build check a échoué sur la PR :';
            const subjectEmoji = allPassed ? '✅' : '⚠️';
            const subjectStatus = allPassed ? 'réussi' : 'échoué';

            const html = `
            <!DOCTYPE html>
            <html><head><meta charset="utf-8"></head>
            <body style="margin:0;padding:0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr><td align="center" style="padding:30px 0;">
                  <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
                         style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <tr><td style="background:${headerGradient};padding:25px;text-align:center;">
                      <h1 style="color:#fff;margin:0;font-size:20px;">${headerEmoji} ${headerTitle}</h1>
                      <p style="color:rgba(255,255,255,0.85);margin:6px 0 0;font-size:13px;">
                        PR #${prNumber} · ${branch} · Build #${runNumber}
                      </p>
                    </td></tr>

                    <tr><td style="padding:20px 30px;">
                      <p style="color:#333;margin:0 0 15px;">${bodyText}</p>
                      <p style="background:#f8f9fa;padding:10px;border-radius:6px;font-weight:600;color:#1a1a2e;">
                        ${prTitle}
                      </p>

                      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:15px 0;">
                        <tr><td style="padding:8px 10px;background:#f8f9fa;border-radius:6px;">
                          <strong>${androidIcon} Android</strong>
                          <span style="float:right;font-weight:600;color:${androidResult === 'success' ? '#34A853' : '#e53935'};">
                            ${androidResult.toUpperCase()}
                          </span>
                        </td></tr>
                        <tr><td style="height:6px;"></td></tr>
                        <tr><td style="padding:8px 10px;background:#f8f9fa;border-radius:6px;">
                          <strong>${iosIcon} iOS</strong>
                          <span style="float:right;font-weight:600;color:${iosResult === 'success' ? '#34A853' : '#e53935'};">
                            ${iosResult.toUpperCase()}
                          </span>
                        </td></tr>
                      </table>

                      <p style="font-size:13px;color:#666;">
                        <strong>Commit :</strong> ${commitSha}<br/>
                        <strong>Branche :</strong> ${branch}<br/>
                        <strong>Date :</strong> ${new Date().toLocaleString('fr-FR', {timeZone:'Europe/Paris'})}
                      </p>
                    </td></tr>

                    <tr><td style="padding:10px 30px 25px;text-align:center;">
                      <a href="${actionsUrl}"
                         style="display:inline-block;padding:10px 24px;background:#1a1a2e;color:#fff;
                                text-decoration:none;border-radius:6px;font-size:13px;">
                        🔍 Voir les logs du build
                      </a>
                    </td></tr>

                    <tr><td style="padding:12px 30px;background:#f8f9fa;text-align:center;
                             font-size:11px;color:#999;border-top:1px solid #eee;">
                      Maya Connect © 2026 · Notification automatique de build
                    </td></tr>
                  </table>
                </td></tr>
              </table>
            </body></html>`;

            async function sendEmail(to) {
              return new Promise((resolve, reject) => {
                const payload = JSON.stringify({
                  from: 'Maya Build <support@maya-appli.fr>',
                  to,
                  subject: `${subjectEmoji} Build #${runNumber} ${subjectStatus} — ${branch} (${commitSha})`,
                  html
                });
                const req = https.request({
                  hostname: 'api.resend.com',
                  path: '/emails',
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.RESEND_API_KEY}`
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => {
                    console.log(`→ ${to}: ${res.statusCode} ${data}`);
                    resolve(res.statusCode);
                  });
                });
                req.on('error', reject);
                req.write(payload);
                req.end();
              });
            }

            const results = await Promise.allSettled(recipients.map(sendEmail));
            const ok = results.filter(r => r.status === 'fulfilled').length;
            const label = allPassed ? 'Success' : 'Failure';
            console.log(`📧 ${label} notifications sent: ${ok}/${recipients.length}`);

      - name: ❌ Fail job if builds failed
        if: needs.build-android.result != 'success' || needs.build-ios.result != 'success'
        run: exit 1
