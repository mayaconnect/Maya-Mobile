name: Deploy to TestFlight & Google Play

on:
  # D√©ploiement automatique sur push vers master
  push:
    branches:
      - master
      - main

  # D√©ploiement manuel depuis l'interface GitHub
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to deploy'
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: 'both'

jobs:
  # ==========================================
  # JOB ANDROID - Build et Deploy sur Google Play
  # ==========================================
  deploy-android:
    name: ü§ñ Android ‚Üí Google Play
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))
    runs-on: ubuntu-latest

    steps:
      - name: üì• Checkout code
        uses: actions/checkout@v4

      - name: üü¢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: üì¶ Install dependencies (excluding dev dependencies for Release)
        run: npm ci --omit=dev

      - name: üíæ Backup Fastlane configuration
        run: |
          mkdir -p /tmp/fastlane-backup
          cp -r android/fastlane /tmp/fastlane-backup/ || echo "No fastlane folder to backup"

      - name: üî® Generate Android native folder
        run: npx expo prebuild --platform android --clean

      - name: üìã Restore Fastlane configuration
        run: |
          cp -r /tmp/fastlane-backup/fastlane android/
          echo "Fastlane configuration restored"
          ls -la android/fastlane/

      - name: üîß Fix build.gradle - Remove problematic blocks
        run: |
          echo "üîß Fixing build.gradle syntax issues..."
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "üìÑ First 30 lines of build.gradle:"
            head -n 30 "$BUILD_GRADLE" || true
            echo ""
            
            python3 <<'PYTHON_EOF'
          import re

          file_path = 'android/app/build.gradle'

          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()

          print('üîç Analyzing build.gradle...')

          # Function to find matching closing brace
          def find_closing_brace(text, start_pos):
              """Find the position of the closing brace that matches the opening brace at start_pos"""
              brace_count = 0
              i = start_pos
              while i < len(text):
                  if text[i] == '{':
                      brace_count += 1
                  elif text[i] == '}':
                      brace_count -= 1
                      if brace_count == 0:
                          return i
                  i += 1
              return -1

          # Remove androidResources blocks (using proper brace matching)
          pattern = r'androidResources\s*\{'
          matches = list(re.finditer(pattern, content))
          if matches:
              print(f'üö´ Found {len(matches)} androidResources block(s)')
              # Remove blocks in reverse order to preserve positions
              for match in reversed(matches):
                  brace_pos = content.index('{', match.start())
                  end_pos = find_closing_brace(content, brace_pos)
                  if end_pos != -1:
                      # Remove the entire block including the keyword
                      content = content[:match.start()] + content[end_pos + 1:]

          # Remove packaging/packagingOptions blocks (using proper brace matching)
          pattern = r'(packagingOptions|packaging)\s*\{'
          matches = list(re.finditer(pattern, content))
          if matches:
              print(f'üö´ Found {len(matches)} packaging block(s)')
              # Remove blocks in reverse order to preserve positions
              for match in reversed(matches):
                  brace_pos = content.index('{', match.start())
                  end_pos = find_closing_brace(content, brace_pos)
                  if end_pos != -1:
                      # Remove the entire block including the keyword
                      content = content[:match.start()] + content[end_pos + 1:]

          # Handle duplicate buildTypes blocks - use line-by-line approach for better detection
          lines = content.splitlines(keepends=True)
          output_lines = []
          skip_block = False
          brace_count = 0
          buildtypes_count = 0
          block_start_line = 0
          in_android_block = False
          android_brace_level = 0
          removed_blocks = []

          for i, line in enumerate(lines, 1):
              stripped = line.strip()
              
              # Track if we're inside android block
              if 'android {' in stripped or 'android{' in stripped:
                  in_android_block = True
                  android_brace_level = stripped.count('{') - stripped.count('}')
                  output_lines.append(line)
                  continue
              
              if in_android_block:
                  android_brace_level += line.count('{') - line.count('}')
                  if android_brace_level <= 0:
                      in_android_block = False
              
              # Detect buildTypes blocks
              if 'buildTypes' in stripped and '{' in line:
                  buildtypes_count += 1
                  
                  # If buildTypes is outside android block, remove it
                  if not in_android_block:
                      print(f'üö´ Found buildTypes OUTSIDE android block at line {i}, removing it')
                      skip_block = True
                      removed_blocks.append(f'buildTypes outside android (line {i})')
                      brace_count = line.count('{') - line.count('}')
                      block_start_line = i
                      continue
                  
                  # If it's a duplicate inside android block, keep only the first
                  if buildtypes_count > 1:
                      print(f'üö´ Found duplicate buildTypes at line {i}, removing it')
                      skip_block = True
                      removed_blocks.append(f'duplicate buildTypes (line {i})')
                      brace_count = line.count('{') - line.count('}')
                      block_start_line = i
                      continue
                  else:
                      print(f'‚úÖ Keeping first buildTypes block at line {i} (inside android block)')
              
              # If we're inside a problematic block, count braces
              if skip_block:
                  brace_count += line.count('{') - line.count('}')
                  if brace_count <= 0:
                      print(f'‚úÖ Finished removing block at line {i} (started at line {block_start_line})')
                      skip_block = False
                      block_start_line = 0
                  continue
              
              # Keep all other lines
              output_lines.append(line)
          
          content = ''.join(output_lines)
          
          # Verify we have exactly one buildTypes block inside android
          buildtypes_inside_android = 0
          in_android = False
          android_braces = 0
          for line in content.splitlines():
              if 'android {' in line or 'android{' in line:
                  in_android = True
                  android_braces = line.count('{') - line.count('}')
              elif in_android:
                  android_braces += line.count('{') - line.count('}')
                  if android_braces <= 0:
                      in_android = False
                  elif 'buildTypes' in line and '{' in line:
                      buildtypes_inside_android += 1
          
          if buildtypes_inside_android == 1:
              print(f'‚úÖ Verified: Exactly 1 buildTypes block inside android block')
          elif buildtypes_inside_android > 1:
              print(f'‚ö†Ô∏è WARNING: Found {buildtypes_inside_android} buildTypes blocks inside android block')
          else:
              print(f'‚ö†Ô∏è WARNING: No buildTypes block found inside android block!')

          # Clean up extra blank lines
          content = re.sub(r'\n\n\n+', '\n\n', content)

          # Verify brace balance
          open_braces = content.count('{')
          close_braces = content.count('}')
          print(f'üìä Final brace count: {open_braces} open, {close_braces} close')

          if open_braces != close_braces:
              print(f'‚ùå ERROR: Brace mismatch! Difference: {open_braces - close_braces}')
              exit(1)

          # Verify buildTypes count
          final_buildtypes = len(re.findall(r'buildTypes\s*\{', content))
          print(f'‚úÖ Final buildTypes count: {final_buildtypes}')

          if final_buildtypes != 1:
              print(f'‚ö†Ô∏è WARNING: Expected 1 buildTypes block, found {final_buildtypes}')

          # Write the fixed content
          with open(file_path, 'w', encoding='utf-8') as f:
              f.write(content)

          print('‚úÖ build.gradle fixed successfully')
          PYTHON_EOF
            
            echo "‚úÖ build.gradle syntax fixed"
            
            # Validate Gradle syntax
            echo "üîç Validating Gradle syntax..."
            cd android
            echo "Running: ./gradlew tasks --dry-run"
            if ./gradlew tasks --dry-run 2>&1 | tee /tmp/gradle-validation.log; then
              echo "‚úÖ Gradle syntax validation passed"
            else
              echo "‚ùå ERROR: Gradle syntax validation failed"
              echo ""
              echo "=== Full Gradle error output ==="
              cat /tmp/gradle-validation.log || true
              echo ""
              echo "=== build.gradle content (first 50 lines) ==="
              head -n 50 app/build.gradle || true
              echo ""
              echo "=== build.gradle content (lines 100-200) ==="
              sed -n '100,200p' app/build.gradle || true
              echo ""
              echo "=== Checking for common issues ==="
              echo "Number of '{' in build.gradle: $(grep -o '{' app/build.gradle | wc -l)"
              echo "Number of '}' in build.gradle: $(grep -o '}' app/build.gradle | wc -l)"
              echo "Number of 'buildTypes {' in build.gradle: $(grep -c 'buildTypes {' app/build.gradle || echo 0)"
              echo "Number of 'androidResources' in build.gradle: $(grep -c 'androidResources' app/build.gradle || echo 0)"
              echo "Number of 'packaging' in build.gradle: $(grep -c 'packaging' app/build.gradle || echo 0)"
              cd ..
              exit 1
            fi
            cd ..
          else
            echo "‚ùå ERROR: build.gradle not found"
            exit 1
          fi

      - name: üîß Configure release signing in build.gradle
        run: |
          echo "üîß Configuring release signing in build.gradle..."
          BUILD_GRADLE="android/app/build.gradle"
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "‚ùå ERROR: build.gradle not found. expo prebuild may have failed."
            exit 1
          fi
          
          # Create backup
          cp "$BUILD_GRADLE" "$BUILD_GRADLE.backup"
          
          # Check if signingConfigs.release already exists
          if grep -q "signingConfigs.release" "$BUILD_GRADLE" || (grep -A 10 "signingConfigs {" "$BUILD_GRADLE" | grep -q "release {"); then
            echo "‚úÖ signingConfigs.release already exists"
          else
            # Add release config after debug config in signingConfigs block
            awk '
              /signingConfigs \{/ { 
                print
                in_signing = 1
                next
              }
              in_signing && /^    \}/ {
                print "        release {"
                print "            if (project.hasProperty(\"MAYA_UPLOAD_STORE_FILE\")) {"
                print "                storeFile file(MAYA_UPLOAD_STORE_FILE)"
                print "                storePassword MAYA_UPLOAD_STORE_PASSWORD"
                print "                keyAlias MAYA_UPLOAD_KEY_ALIAS"
                print "                keyPassword MAYA_UPLOAD_KEY_PASSWORD"
                print "            }"
                print "        }"
                print
                in_signing = 0
              }
              { print }
            ' "$BUILD_GRADLE" > "$BUILD_GRADLE.tmp" && mv "$BUILD_GRADLE.tmp" "$BUILD_GRADLE"
            echo "‚úÖ Added signingConfigs.release"
          fi
          
          # Ensure release buildType uses signingConfigs.release instead of debug
          if grep -A 10 "release {" "$BUILD_GRADLE" | grep -q "signingConfig signingConfigs\.debug"; then
            echo "‚ö†Ô∏è  WARNING: Release buildType is using debug signing! Fixing..."
            sed -i '/release {/,/^    }/s/signingConfig signingConfigs\.debug/signingConfig signingConfigs.release/g' "$BUILD_GRADLE"
            echo "‚úÖ Fixed: Replaced debug signing with release signing"
          elif grep -A 10 "release {" "$BUILD_GRADLE" | grep -q "signingConfig signingConfigs.release"; then
            echo "‚úÖ Release buildType already uses signingConfigs.release"
          else
            echo "‚ö†Ô∏è  No signingConfig found in release block, adding signingConfigs.release"
            sed -i '/release {/a\            signingConfig signingConfigs.release' "$BUILD_GRADLE"
            echo "‚úÖ Added signingConfig signingConfigs.release to release buildType"
          fi
          
          # Final verification - ensure release does NOT use debug
          if grep -A 10 "release {" "$BUILD_GRADLE" | grep -q "signingConfig signingConfigs\.debug"; then
            echo "‚ùå ERROR: Release buildType still uses debug signing after configuration!"
            echo "Build.gradle content around release block:"
            grep -A 10 "release {" "$BUILD_GRADLE"
            exit 1
          else
            echo "‚úÖ Verification passed: Release buildType uses release signing (not debug)"
          fi
          
          echo "‚úÖ Release signing configuration complete"
          
          # Verify build.gradle is still valid after signing configuration
          echo "üîç Verifying build.gradle syntax after signing configuration..."
          cd android
          if ./gradlew tasks --dry-run > /dev/null 2>&1; then
            echo "‚úÖ build.gradle syntax is still valid after signing configuration"
          else
            echo "‚ö†Ô∏è WARNING: build.gradle syntax error after signing configuration!"
            echo "This might be caused by the awk script. Re-running fix script..."
            cd ..
            # Re-run the fix script
            python3 <<'PYTHON_EOF'
          import re

          file_path = 'android/app/build.gradle'

          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()

          print('üîç Re-analyzing build.gradle after signing configuration...')

          # Function to find matching closing brace
          def find_closing_brace(text, start_pos):
              brace_count = 0
              i = start_pos
              while i < len(text):
                  if text[i] == '{':
                      brace_count += 1
                  elif text[i] == '}':
                      brace_count -= 1
                      if brace_count == 0:
                          return i
                  i += 1
              return -1

          # Remove androidResources blocks
          pattern = r'androidResources\s*\{'
          matches = list(re.finditer(pattern, content))
          if matches:
              print(f'üö´ Found {len(matches)} androidResources block(s)')
              for match in reversed(matches):
                  brace_pos = content.index('{', match.start())
                  end_pos = find_closing_brace(content, brace_pos)
                  if end_pos != -1:
                      content = content[:match.start()] + content[end_pos + 1:]

          # Remove packaging blocks
          pattern = r'(packagingOptions|packaging)\s*\{'
          matches = list(re.finditer(pattern, content))
          if matches:
              print(f'üö´ Found {len(matches)} packaging block(s)')
              for match in reversed(matches):
                  brace_pos = content.index('{', match.start())
                  end_pos = find_closing_brace(content, brace_pos)
                  if end_pos != -1:
                      content = content[:match.start()] + content[end_pos + 1:]

          # Handle duplicate buildTypes blocks
          lines = content.splitlines(keepends=True)
          output_lines = []
          skip_block = False
          brace_count = 0
          buildtypes_count = 0
          block_start_line = 0
          in_android_block = False
          android_brace_level = 0

          for i, line in enumerate(lines, 1):
              stripped = line.strip()
              
              if 'android {' in stripped or 'android{' in stripped:
                  in_android_block = True
                  android_brace_level = stripped.count('{') - stripped.count('}')
                  output_lines.append(line)
                  continue
              
              if in_android_block:
                  android_brace_level += line.count('{') - line.count('}')
                  if android_brace_level <= 0:
                      in_android_block = False
              
              if 'buildTypes' in stripped and '{' in line:
                  buildtypes_count += 1
                  
                  if not in_android_block:
                      print(f'üö´ Found buildTypes OUTSIDE android block at line {i}, removing it')
                      skip_block = True
                      brace_count = line.count('{') - line.count('}')
                      block_start_line = i
                      continue
                  
                  if buildtypes_count > 1:
                      print(f'üö´ Found duplicate buildTypes at line {i}, removing it')
                      skip_block = True
                      brace_count = line.count('{') - line.count('}')
                      block_start_line = i
                      continue
                  else:
                      print(f'‚úÖ Keeping first buildTypes block at line {i}')
              
              if skip_block:
                  brace_count += line.count('{') - line.count('}')
                  if brace_count <= 0:
                      print(f'‚úÖ Finished removing block at line {i}')
                      skip_block = False
                      block_start_line = 0
                  continue
              
              output_lines.append(line)
          
          content = ''.join(output_lines)
          
          # Verify brace balance
          open_braces = content.count('{')
          close_braces = content.count('}')
          print(f'üìä Final brace count: {open_braces} open, {close_braces} close')

          if open_braces != close_braces:
              print(f'‚ùå ERROR: Brace mismatch! Difference: {open_braces - close_braces}')
              exit(1)

          # Write the fixed content
          with open(file_path, 'w', encoding='utf-8') as f:
              f.write(content)

          print('‚úÖ build.gradle re-fixed after signing configuration')
          PYTHON_EOF
            cd android
            # Verify again
            if ./gradlew tasks --dry-run > /dev/null 2>&1; then
              echo "‚úÖ build.gradle syntax is now valid after re-fix"
            else
              echo "‚ùå ERROR: build.gradle still has syntax errors after re-fix"
              ./gradlew tasks --dry-run 2>&1 | head -50 || true
              exit 1
            fi
          fi
          cd ..

      - name: üîß Set gradlew permissions
        working-directory: android
        run: |
          chmod +x gradlew
          echo "‚úÖ Gradlew permissions set"

      - name: üîß Generate React Native Codegen artifacts
        working-directory: android
        run: |
          echo "Generating codegen artifacts for all modules..."
          # Generate codegen artifacts for all native modules, not just the app
          ./gradlew generateCodegenArtifactsFromSchema --stacktrace || {
            echo "‚ö†Ô∏è Codegen generation had issues, but continuing..."
            exit 0
          }
          echo "‚úÖ Codegen artifacts generated"

      - name: üíé Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: üîê Decode Android keystore
        run: |
          echo "üì¶ Decoding keystore from GitHub secret..."
          mkdir -p android/app
          # Decode base64 keystore and save to android/app/
          # Support both old secret name (ANDROID_KEYSTORE_BASE64) and new (MAYA_UPLOAD_KEYSTORE_BASE64)
          if [ -n "${{ secrets.MAYA_UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.MAYA_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/maya-release.keystore
            KEYSTORE_SECRET="MAYA_UPLOAD_KEYSTORE_BASE64"
          elif [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/maya-release.keystore
            KEYSTORE_SECRET="ANDROID_KEYSTORE_BASE64"
          else
            echo "‚ùå ERROR: No keystore secret found!"
            echo "Please set either MAYA_UPLOAD_KEYSTORE_BASE64 or ANDROID_KEYSTORE_BASE64 in GitHub Secrets"
            exit 1
          fi
          
          if [ ! -f "android/app/maya-release.keystore" ]; then
            echo "‚ùå ERROR: Failed to create keystore file"
            exit 1
          fi
          
          echo "‚úÖ Keystore decoded successfully at android/app/maya-release.keystore"
          ls -lh android/app/maya-release.keystore
          
          # Verify keystore SHA1 matches expected value
          echo "üîç Verifying keystore SHA1..."
          KEY_ALIAS="${{ secrets.MAYA_UPLOAD_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS }}"
          STORE_PASSWORD="${{ secrets.MAYA_UPLOAD_STORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}"
          EXPECTED_SHA1="${{ secrets.MAYA_UPLOAD_EXPECTED_SHA1 || secrets.ANDROID_KEYSTORE_EXPECTED_SHA1 }}"
          
          if [ -n "$EXPECTED_SHA1" ] && [ -n "$KEY_ALIAS" ] && [ -n "$STORE_PASSWORD" ]; then
            SHA1=$(keytool -list -v -keystore android/app/maya-release.keystore -alias "$KEY_ALIAS" -storepass "$STORE_PASSWORD" 2>/dev/null | grep "SHA1:" | awk '{print $2}' || echo "")
            echo "Keystore SHA1: $SHA1"
            if [ "$SHA1" = "$EXPECTED_SHA1" ]; then
              echo "‚úÖ Keystore SHA1 matches expected value!"
            else
              echo "‚ùå ERROR: Keystore SHA1 does NOT match expected value!"
              echo "Expected: $EXPECTED_SHA1"
              echo "Got:      $SHA1"
              echo ""
              echo "This will cause Google Play to reject the AAB."
              echo "Please update the keystore secret with the correct keystore."
              exit 1
            fi
          else
            echo "‚ÑπÔ∏è Skipping SHA1 verification (no expected SHA1 secret provided or missing alias/password)"
          fi

      - name: ‚öôÔ∏è Configure signing properties (Gradle)
        run: |
          echo "‚öôÔ∏è Configuring signing properties in gradle.properties..."
          # Ensure gradle.properties exists (expo prebuild may or may not create it)
          if [ ! -f "android/gradle.properties" ]; then
            echo "Creating android/gradle.properties..."
            touch android/gradle.properties
          fi
          
          # Remove any existing MAYA_UPLOAD properties to avoid duplicates
          if [ -f "android/gradle.properties" ]; then
            sed -i.bak '/^MAYA_UPLOAD/d' android/gradle.properties || sed -i '/^MAYA_UPLOAD/d' android/gradle.properties
          fi
          
          # Append signing properties to gradle.properties
          # Support both old and new secret names for backward compatibility
          cat >> android/gradle.properties <<EOF
          # Android signing configuration (injected at CI runtime)
          MAYA_UPLOAD_STORE_FILE=maya-release.keystore
          MAYA_UPLOAD_STORE_PASSWORD=${{ secrets.MAYA_UPLOAD_STORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          MAYA_UPLOAD_KEY_ALIAS=${{ secrets.MAYA_UPLOAD_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS }}
          MAYA_UPLOAD_KEY_PASSWORD=${{ secrets.MAYA_UPLOAD_KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "‚úÖ Signing properties configured"
          # Show the properties (without passwords) for verification
          echo "Configured properties:"
          grep "MAYA_UPLOAD" android/gradle.properties | sed 's/PASSWORD=.*/PASSWORD=***/' || true
          
          # Also add other Gradle settings if they don't exist
          if ! grep -q "org.gradle.jvmargs" android/gradle.properties; then
            cat >> android/gradle.properties <<EOF
          
          # Gradle settings
          org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=true
          
          # React Native / Hermes settings
          hermesEnabled=true
          newArchEnabled=true
          EOF
            echo "‚úÖ Additional Gradle settings added"
          fi

      - name: üîë Create Google Play service account JSON
        run: |
          mkdir -p android/fastlane
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > android/fastlane/google-play-service-account.json
          echo "Service account configured"

      - name: ‚úÖ Final build.gradle verification before build
        run: |
          echo "üîç Final verification of build.gradle before build..."
          cd android
          
          # Check for problematic blocks one more time
          if grep -q "androidResources" app/build.gradle; then
            echo "‚ö†Ô∏è WARNING: androidResources block still present!"
          fi
          
          if grep -c "buildTypes {" app/build.gradle | grep -v "^1$"; then
            echo "‚ö†Ô∏è WARNING: Multiple buildTypes blocks detected!"
            echo "Number of buildTypes blocks: $(grep -c 'buildTypes {' app/build.gradle || echo 0)"
          fi
          
          # Final syntax check
          echo "Running final Gradle syntax check..."
          if ./gradlew tasks --dry-run --stacktrace > /tmp/final-gradle-check.log 2>&1; then
            echo "‚úÖ Final syntax check passed - build.gradle is ready for build"
          else
            echo "‚ùå ERROR: Final syntax check failed!"
            echo "=== Error output ==="
            cat /tmp/final-gradle-check.log | head -100 || true
            echo ""
            echo "=== build.gradle around problematic area ==="
            # Try to find the error line from the log
            ERROR_LINE=$(grep -o "line: [0-9]*" /tmp/final-gradle-check.log | head -1 | grep -o "[0-9]*" || echo "135")
            echo "Checking around line $ERROR_LINE:"
            START_LINE=$((ERROR_LINE - 10))
            END_LINE=$((ERROR_LINE + 20))
            sed -n "${START_LINE},${END_LINE}p" app/build.gradle || true
            exit 1
          fi
          cd ..

      - name: ‚úÖ Verify signing configuration before build
        run: |
          echo "üîç Verifying signing configuration..."
          
          # Check keystore file exists
          if [ ! -f "android/app/maya-release.keystore" ]; then
            echo "‚ùå ERROR: Keystore file not found at android/app/maya-release.keystore"
            exit 1
          fi
          echo "‚úÖ Keystore file exists: $(ls -lh android/app/maya-release.keystore)"
          
          # Check gradle.properties has signing config
          if [ ! -f "android/gradle.properties" ]; then
            echo "‚ùå ERROR: gradle.properties not found!"
            exit 1
          fi
          
          echo "üìã Checking gradle.properties for signing properties:"
          if grep -q "MAYA_UPLOAD_STORE_FILE" android/gradle.properties; then
            echo "‚úÖ MAYA_UPLOAD_STORE_FILE found"
            STORE_FILE=$(grep "MAYA_UPLOAD_STORE_FILE" android/gradle.properties | cut -d'=' -f2)
            echo "   Value: $STORE_FILE"
          else
            echo "‚ùå ERROR: MAYA_UPLOAD_STORE_FILE not found in gradle.properties"
            exit 1
          fi
          
          if grep -q "MAYA_UPLOAD_STORE_PASSWORD" android/gradle.properties; then
            echo "‚úÖ MAYA_UPLOAD_STORE_PASSWORD found (hidden)"
          else
            echo "‚ùå ERROR: MAYA_UPLOAD_STORE_PASSWORD not found in gradle.properties"
            exit 1
          fi
          
          if grep -q "MAYA_UPLOAD_KEY_ALIAS" android/gradle.properties; then
            echo "‚úÖ MAYA_UPLOAD_KEY_ALIAS found"
            KEY_ALIAS=$(grep "MAYA_UPLOAD_KEY_ALIAS" android/gradle.properties | cut -d'=' -f2)
            echo "   Value: $KEY_ALIAS"
          else
            echo "‚ùå ERROR: MAYA_UPLOAD_KEY_ALIAS not found in gradle.properties"
            exit 1
          fi
          
          if grep -q "MAYA_UPLOAD_KEY_PASSWORD" android/gradle.properties; then
            echo "‚úÖ MAYA_UPLOAD_KEY_PASSWORD found (hidden)"
          else
            echo "‚ùå ERROR: MAYA_UPLOAD_KEY_PASSWORD not found in gradle.properties"
            exit 1
          fi
          
          # Verify build.gradle has signingConfigs.release
          if grep -q "signingConfigs.release" android/app/build.gradle || grep -A 10 "signingConfigs {" android/app/build.gradle | grep -q "release {"; then
            echo "‚úÖ signingConfigs.release found in build.gradle"
          else
            echo "‚ùå ERROR: signingConfigs.release not found in build.gradle"
            exit 1
          fi
          
          # Verify release buildType uses signingConfigs.release
          if grep -A 10 "release {" android/app/build.gradle | grep -q "signingConfig signingConfigs.release"; then
            echo "‚úÖ release buildType uses signingConfigs.release"
          else
            echo "‚ùå ERROR: release buildType does not use signingConfigs.release"
            echo "Release block content:"
            grep -A 10 "release {" android/app/build.gradle || true
            exit 1
          fi
          
          echo "‚úÖ All signing configuration checks passed!"

      - name: üöÄ Deploy to Google Play Internal Testing
        working-directory: android
        run: bundle exec fastlane internal
        env:
          SUPPLY_JSON_KEY: ./fastlane/google-play-service-account.json

      - name: üîç Verify AAB signature (prevent debug signature)
        run: |
          echo "üîç Verifying AAB signature to ensure it's NOT signed with debug keystore..."
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          
          if [ ! -f "$AAB_PATH" ]; then
            echo "‚ùå ERROR: AAB file not found at $AAB_PATH"
            exit 1
          fi
          
          echo "‚úÖ AAB file found, verifying signature..."
          
          # Get expected SHA1 from secrets
          EXPECTED_SHA1="${{ secrets.MAYA_UPLOAD_EXPECTED_SHA1 || secrets.ANDROID_KEYSTORE_EXPECTED_SHA1 }}"
          
          if [ -z "$EXPECTED_SHA1" ]; then
            echo "‚ö†Ô∏è WARNING: No expected SHA1 provided, skipping AAB signature verification"
            echo "To enable verification, set MAYA_UPLOAD_EXPECTED_SHA1 or ANDROID_KEYSTORE_EXPECTED_SHA1 secret"
            exit 0
          fi
          
          # Try to extract SHA1 from AAB using jarsigner or apksigner
          CERT_SHA1=""
          
          if command -v apksigner >/dev/null 2>&1; then
            echo "Using apksigner to verify signature..."
            # Note: apksigner works with APK, not AAB directly
            # We'll use jarsigner instead for AAB
            CERT_SHA1=$(jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | grep -i "SHA1" | head -1 | sed 's/.*SHA1: //' | awk '{print $1}' || echo "")
          elif command -v jarsigner >/dev/null 2>&1; then
            echo "Using jarsigner to verify signature..."
            # Extract certificate info from AAB
            CERT_SHA1=$(jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | grep -i "SHA1" | head -1 | sed 's/.*SHA1: //' | awk '{print $1}' || echo "")
          fi
          
          if [ -z "$CERT_SHA1" ]; then
            # Try alternative method: extract and check META-INF
            echo "Trying alternative method to verify signature..."
            TEMP_DIR=$(mktemp -d)
            unzip -q "$AAB_PATH" -d "$TEMP_DIR" 2>/dev/null || true
            
            if [ -d "$TEMP_DIR/META-INF" ]; then
              echo "‚úÖ AAB is signed (META-INF folder found)"
              # Try to get SHA1 from certificate files
              if [ -f "$TEMP_DIR/META-INF/*.RSA" ] || [ -f "$TEMP_DIR/META-INF/*.DSA" ] || [ -f "$TEMP_DIR/META-INF/*.EC" ]; then
                CERT_FILE=$(find "$TEMP_DIR/META-INF" -name "*.RSA" -o -name "*.DSA" -o -name "*.EC" | head -1)
                if [ -n "$CERT_FILE" ]; then
                  CERT_SHA1=$(keytool -printcert -file "$CERT_FILE" 2>/dev/null | grep "SHA1:" | awk '{print $2}' || echo "")
                fi
              fi
            else
              echo "‚ùå ERROR: AAB is not signed! Missing META-INF folder"
              rm -rf "$TEMP_DIR"
              exit 1
            fi
            rm -rf "$TEMP_DIR"
          fi
          
          if [ -n "$CERT_SHA1" ]; then
            echo "AAB Certificate SHA1: $CERT_SHA1"
            echo "Expected SHA1: $EXPECTED_SHA1"
            
            # Normalize SHA1 format (remove colons and convert to uppercase for comparison)
            CERT_SHA1_NORMALIZED=$(echo "$CERT_SHA1" | tr -d ':' | tr '[:lower:]' '[:upper:]')
            EXPECTED_SHA1_NORMALIZED=$(echo "$EXPECTED_SHA1" | tr -d ':' | tr '[:lower:]' '[:upper:]')
            
            if [ "$CERT_SHA1_NORMALIZED" = "$EXPECTED_SHA1_NORMALIZED" ]; then
              echo "‚úÖ AAB is correctly signed with the release keystore!"
            else
              # Check if it's the debug keystore (common debug SHA1 pattern)
              if echo "$CERT_SHA1" | grep -qi "61:ED:37:7E:85:D3"; then
                echo "‚ùå ERROR: AAB is signed with DEBUG keystore!"
                echo "This will be rejected by Google Play."
                echo "Expected release SHA1: $EXPECTED_SHA1"
                echo "Got debug SHA1: $CERT_SHA1"
                exit 1
              else
                echo "‚ö†Ô∏è WARNING: AAB SHA1 does not match expected release keystore"
                echo "Expected: $EXPECTED_SHA1"
                echo "Got:      $CERT_SHA1"
                echo "Continuing, but this may cause issues with Google Play..."
              fi
            fi
          else
            echo "‚ö†Ô∏è WARNING: Could not extract SHA1 from AAB signature"
            echo "AAB file exists and appears to be signed, but signature verification was skipped"
            echo "This is not ideal but continuing..."
          fi

      - name: üì§ Upload Android artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: ‚úÖ Android deployment success
        if: success()
        run: |
          echo "‚úÖ Android app successfully deployed to Google Play Internal Testing!"
          echo "üì± Go to Google Play Console to test: https://play.google.com/console/"

  # ==========================================
  # JOB iOS - Build et Deploy sur TestFlight
  # ==========================================
  deploy-ios:
    name: üçé iOS ‚Üí TestFlight
    env:
      _EXPO_PUBLIC_API_BASE_URL: ${{ vars._EXPO_PUBLIC_API_BASE_URL }}
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))
    runs-on: macos-15  # macOS 15 has Xcode 16.x

    steps:
      - name: üì• Checkout code
        uses: actions/checkout@v4

      - name: üü¢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: üì¶ Install dependencies (excluding dev dependencies for Release)
        run: npm ci --omit=dev

      - name: üîß Select Xcode 16.1
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version

      - name: üî® Generate iOS native folder
        run: npx expo prebuild --platform ios --clean

      - name: üîß Fix iOS nullability issues
        run: |
          chmod +x scripts/fix-ios-nullability.sh
          bash scripts/fix-ios-nullability.sh

      - name: üîß Set iOS deployment target in Xcode project
        run: |
          # Find the Xcode project file dynamically
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "üì± Found Xcode project at: $PROJECT_FILE"
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*/IPHONEOS_DEPLOYMENT_TARGET = 13.4/g' "$PROJECT_FILE"
            echo "‚úÖ Set IPHONEOS_DEPLOYMENT_TARGET to 13.4"
            # Verify the change
            echo "üîç Verification:"
            grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -n 3
          else
            echo "‚ö†Ô∏è Warning: Could not find Xcode project.pbxproj file"
            exit 1
          fi

      - name: üíé Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: üßπ Clean Xcode Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: üîß Configure Podfile build settings
        working-directory: ios
        run: |
          echo "üîß Adding custom build settings to Podfile post_install hook"

          # Insert custom build settings into the existing post_install hook
          sed -i '' '/post_install do |installer|/a\
          \  # Custom build settings\
          \  installer.pods_project.targets.each do |target|\
          \    target.build_configurations.each do |config|\
          \      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.4"\
          \      config.build_settings["GCC_WARN_INHIBIT_ALL_WARNINGS"] = "YES"\
          \      config.build_settings["SWIFT_SUPPRESS_WARNINGS"] = "YES"\
          \    end\
          \  end\
          ' Podfile

          echo "‚úÖ Podfile configured"

      - name: üì¶ Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install
          echo "‚úÖ CocoaPods dependencies installed"

      - name: üîß Set deployment target for all Pods
        run: |
          cd ios
          echo "Setting IPHONEOS_DEPLOYMENT_TARGET for all Pods to 13.4"
          find Pods -name "project.pbxproj" -type f | while read -r file; do
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*/IPHONEOS_DEPLOYMENT_TARGET = 13.4/g' "$file"
          done
          echo "‚úÖ All Pods deployment targets updated"

      - name: üîß Disable Swift 6 strict concurrency checking
        run: |
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "üì± Disabling strict concurrency checking in: $PROJECT_FILE"
            awk '/buildSettings = \{/ {print; print "\t\t\t\tSWIFT_STRICT_CONCURRENCY = minimal;"; next}1' "$PROJECT_FILE" > "$PROJECT_FILE.tmp"
            mv "$PROJECT_FILE.tmp" "$PROJECT_FILE"
            echo "‚úÖ Swift strict concurrency checking disabled"
          fi

      - name: üîê Setup App Store Connect API Key
        run: |
          mkdir -p ios/fastlane/keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 -d > ios/fastlane/keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ios/fastlane/keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          echo "App Store Connect API Key configured"

      - name: üìú Setup Match certificates
        working-directory: ios
        run: bundle exec fastlane match appstore --readonly
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}

      - name: üöÄ Build and Deploy to TestFlight
        working-directory: ios
        run: bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

      - name: üì§ Upload iOS artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-release-ipa
          path: ios/*.ipa
          retention-days: 30

      - name: ‚úÖ iOS deployment success
        if: success()
        run: |
          echo "‚úÖ iOS app successfully deployed to TestFlight!"
          echo "üì± Go to App Store Connect to test: https://appstoreconnect.apple.com/"

  # ==========================================
  # JOB NOTIFICATION - R√©sum√© final
  # ==========================================
  notify-success:
    name: üì¢ Deployment Summary
    needs: [deploy-android, deploy-ios]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: üìä Deployment Summary
        run: |
          echo "======================================"
          echo "üéâ DEPLOYMENT COMPLETED"
          echo "======================================"
          echo ""
          echo "Android Status: ${{ needs.deploy-android.result }}"
          echo "iOS Status: ${{ needs.deploy-ios.result }}"
          echo ""
          if [ "${{ needs.deploy-android.result }}" == "success" ]; then
            echo "‚úÖ Android: https://play.google.com/console/"
          fi
          if [ "${{ needs.deploy-ios.result }}" == "success" ]; then
            echo "‚úÖ iOS: https://appstoreconnect.apple.com/"
          fi
          echo ""
          echo "======================================"