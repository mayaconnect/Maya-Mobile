name: Deploy to TestFlight & Google Play

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to deploy'
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: 'both'

jobs:
  # ==========================================
  # JOB iOS - Build et Deploy sur TestFlight
  # ==========================================
  deploy-ios:
    name: 🍎 iOS → TestFlight (EAS Build)
    # Annule les anciens jobs en queue quand un nouveau est déclenché
    concurrency:
      group: deploy-ios
      cancel-in-progress: true
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔑 Setup App Store Connect API Key
        run: |
          echo "🔑 Creating App Store Connect API Key file..."
          mkdir -p fastlane/keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 -d > fastlane/keys/AuthKey_44Z65DA5ZQ.p8
          chmod 600 fastlane/keys/AuthKey_44Z65DA5ZQ.p8
          echo "✅ API Key file created"

      - name: 🏗️ Build iOS with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: '1'
        run: |
          echo "🔐 EAS credentials configured via EXPO_TOKEN"
          echo "🏗️ Building iOS app with EAS Build..."
          echo "   Profile: production"
          echo "   Platform: ios"
          echo ""
          eas build --platform ios --profile production --non-interactive --wait
          echo "✅ Build completed successfully"

      - name: 📤 Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "📤 Submitting latest build to TestFlight..."
          eas submit --platform ios --profile production --latest --non-interactive
          echo "✅ Submission to TestFlight completed"

      - name: ✅ iOS deployment success
        if: success()
        run: |
          echo "✅ iOS app successfully built and deployed to TestFlight!"
          echo "📱 Go to App Store Connect to test: https://appstoreconnect.apple.com/"
          echo "📊 View builds: https://expo.dev/accounts/[your-account]/projects/maya-mobile-app/builds"

  # ==========================================
  # JOB ANDROID - Build et Deploy sur Google Play
  # ==========================================
  deploy-android:
    name: 🤖 Android → Google Play (EAS Build)
    # Annule les anciens jobs en queue quand un nouveau est déclenché
    concurrency:
      group: deploy-android
      cancel-in-progress: true
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🏗️ Build Android with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: '1'
        run: |
          echo "🔐 EAS credentials configured via EXPO_TOKEN"
          echo "🏗️ Building Android app with EAS Build..."
          echo "   Profile: production"
          echo "   Platform: android"
          echo ""
          eas build --platform android --profile production --non-interactive --wait
          echo "✅ Build completed successfully"

      - name: 🔑 Setup Google Service Account
        run: |
          echo "🔑 Creating Google Service Account file..."
          if [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}" ]; then
            echo "❌ Error: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 secret is not set"
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > google-service-account.json
          # Vérifier que le fichier n'est pas vide et est un JSON valide
          if [ ! -s google-service-account.json ]; then
            echo "❌ Error: google-service-account.json is empty"
            exit 1
          fi
          python3 -m json.tool google-service-account.json > /dev/null || (echo "❌ Error: Invalid JSON in google-service-account.json" && exit 1)
          chmod 600 google-service-account.json
          echo "✅ Google Service Account file created successfully"


      - name: 📤 Submit to Google Play
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "📤 Submitting latest build to Google Play..."
          eas submit --platform android --profile production --latest --non-interactive
          echo "✅ Submission to Google Play completed"

      - name: ✅ Android deployment success
        if: success()
        run: |
          echo "✅ Android app successfully built and deployed to Google Play!"
          echo "📱 Go to Google Play Console to test: https://play.google.com/console/"
          echo "📊 View builds: https://expo.dev/accounts/[your-account]/projects/maya-mobile-app/builds"

  
  # ==========================================
  # JOB NOTIFICATION - Résumé final + Email Resend
  # ==========================================
  notify:
    name: 📢 Deployment Summary + Email
    needs: [deploy-ios, deploy-android]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📊 Deployment Summary
        run: |
          echo "======================================"
          echo "🎉 DEPLOYMENT COMPLETED"
          echo "======================================"
          echo ""
          echo "iOS: ${{ needs.deploy-ios.result }}"
          echo "Android: ${{ needs.deploy-android.result }}"
          echo ""
          if [ "${{ needs.deploy-ios.result }}" == "success" ]; then
            echo "✅ iOS: https://appstoreconnect.apple.com/"
          fi
          if [ "${{ needs.deploy-android.result }}" == "success" ]; then
            echo "✅ Android: https://play.google.com/console/"
          fi
          echo ""
          echo "======================================"

      - name: 📧 Send deployment email via Resend
        uses: actions/github-script@v7
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          IOS_RESULT: ${{ needs.deploy-ios.result }}
          ANDROID_RESULT: ${{ needs.deploy-android.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title || 'Deploy' }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        with:
          script: |
            const https = require('https');

            const iosResult = process.env.IOS_RESULT;
            const androidResult = process.env.ANDROID_RESULT;
            const commitSha = process.env.COMMIT_SHA.substring(0, 7);
            const commitMsg = (process.env.COMMIT_MSG || 'No message').substring(0, 120);
            const runId = process.env.RUN_ID;
            const runNumber = process.env.RUN_NUMBER;
            const repo = process.env.REPO;
            const branch = process.env.BRANCH;
            const actionsUrl = `https://github.com/${repo}/actions/runs/${runId}`;

            const allSuccess = iosResult === 'success' && androidResult === 'success';
            const allFailed = iosResult !== 'success' && androidResult !== 'success';

            // Status badges
            const iosIcon = iosResult === 'success' ? '✅' : (iosResult === 'skipped' ? '⏭️' : '❌');
            const androidIcon = androidResult === 'success' ? '✅' : (androidResult === 'skipped' ? '⏭️' : '❌');

            // ---------- Recipients ----------
            // Devs get install invites on success
            const devRecipients = [
              'guillaumel1103@gmail.com',
              'play.castilla@gmail.com',
              'lharoti.pro@gmail.com',
              'mayaconnect2025@gmail.com'
            ];
            // All team members get status notifications
            const allRecipients = [ 
              'guillaumel1103@gmail.com',
              'lharoti.pro@gmail.com'
            ];

            // ---------- Build email ----------
            function buildHtml(recipient) {
              const isDev = devRecipients.includes(recipient);

              const installSection = allSuccess && isDev ? `
                <tr><td style="padding:20px 30px;">
                  <h2 style="color:#1a1a2e;margin:0 0 15px;">📲 Installer la nouvelle version</h2>
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                      <td style="padding:8px 0;">
                        <a href="https://testflight.apple.com/join/YOUR_TESTFLIGHT_CODE"
                           style="display:inline-block;padding:12px 28px;background:#007AFF;color:#fff;
                                  text-decoration:none;border-radius:8px;font-weight:600;">
                          🍎 Ouvrir TestFlight (iOS)
                        </a>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:8px 0;">
                        <a href="https://play.google.com/apps/testing/com.maya.connect"
                           style="display:inline-block;padding:12px 28px;background:#34A853;color:#fff;
                                  text-decoration:none;border-radius:8px;font-weight:600;">
                          🤖 Rejoindre le test interne (Android)
                        </a>
                      </td>
                    </tr>
                  </table>
                  <p style="color:#666;font-size:13px;margin-top:12px;">
                    iOS : Ouvre l'app <strong>TestFlight</strong> sur ton iPhone après avoir cliqué le lien.<br/>
                    Android : Accepte l'invitation puis mets à jour depuis Google Play.
                  </p>
                </td></tr>
              ` : '';

              return `
              <!DOCTYPE html>
              <html><head><meta charset="utf-8"></head>
              <body style="margin:0;padding:0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr><td align="center" style="padding:30px 0;">
                    <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
                           style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                      <!-- Header -->
                      <tr><td style="background:${allSuccess ? 'linear-gradient(135deg,#667eea,#764ba2)' : 'linear-gradient(135deg,#e53935,#d32f2f)'};
                               padding:30px;text-align:center;">
                        <h1 style="color:#fff;margin:0;font-size:22px;">
                          ${allSuccess ? '🎉 Déploiement réussi !' : '🚨 Déploiement échoué'}
                        </h1>
                        <p style="color:rgba(255,255,255,0.85);margin:8px 0 0;font-size:14px;">
                          Maya Connect — Build #${runNumber} · ${branch}
                        </p>
                      </td></tr>

                      <!-- Status -->
                      <tr><td style="padding:25px 30px 10px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                          <tr>
                            <td style="padding:10px;background:#f8f9fa;border-radius:8px;margin-bottom:8px;">
                              <strong>${iosIcon} iOS → TestFlight</strong>
                              <span style="float:right;color:${iosResult === 'success' ? '#34A853' : '#e53935'};font-weight:600;">
                                ${iosResult.toUpperCase()}
                              </span>
                            </td>
                          </tr>
                          <tr><td style="height:8px;"></td></tr>
                          <tr>
                            <td style="padding:10px;background:#f8f9fa;border-radius:8px;">
                              <strong>${androidIcon} Android → Google Play</strong>
                              <span style="float:right;color:${androidResult === 'success' ? '#34A853' : '#e53935'};font-weight:600;">
                                ${androidResult.toUpperCase()}
                              </span>
                            </td>
                          </tr>
                        </table>
                      </td></tr>

                      <!-- Details -->
                      <tr><td style="padding:15px 30px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                               style="font-size:13px;color:#555;">
                          <tr><td style="padding:4px 0;"><strong>Commit :</strong> ${commitSha}</td></tr>
                          <tr><td style="padding:4px 0;"><strong>Message :</strong> ${commitMsg}</td></tr>
                          <tr><td style="padding:4px 0;"><strong>Branche :</strong> ${branch}</td></tr>
                          <tr><td style="padding:4px 0;"><strong>Date :</strong> ${new Date().toLocaleString('fr-FR', {timeZone:'Europe/Paris'})}</td></tr>
                        </table>
                      </td></tr>

                      ${installSection}

                      <!-- CTA logs -->
                      <tr><td style="padding:15px 30px 25px;text-align:center;">
                        <a href="${actionsUrl}"
                           style="display:inline-block;padding:10px 24px;background:#1a1a2e;color:#fff;
                                  text-decoration:none;border-radius:6px;font-size:13px;">
                          📋 Voir les logs GitHub Actions
                        </a>
                      </td></tr>

                      <!-- Footer -->
                      <tr><td style="padding:15px 30px;background:#f8f9fa;text-align:center;
                               font-size:11px;color:#999;border-top:1px solid #eee;">
                        Maya Connect © 2026 · Notification automatique de déploiement
                      </td></tr>
                    </table>
                  </td></tr>
                </table>
              </body></html>`;
            }

            // ---------- Send emails ----------
            async function sendEmail(to, subject, html) {
              return new Promise((resolve, reject) => {
                const payload = JSON.stringify({
                  from: 'Maya Deploy <support@maya-appli.fr>',
                  to,
                  subject,
                  html
                });
                const req = https.request({
                  hostname: 'api.resend.com',
                  path: '/emails',
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.RESEND_API_KEY}`
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => {
                    console.log(`→ ${to}: ${res.statusCode} ${data}`);
                    resolve(res.statusCode);
                  });
                });
                req.on('error', reject);
                req.write(payload);
                req.end();
              });
            }

            const subject = allSuccess
              ? `✅ Maya v${runNumber} déployée avec succès (${branch})`
              : `🚨 Maya v${runNumber} — échec de déploiement (${branch})`;

            const results = await Promise.allSettled(
              allRecipients.map(email => sendEmail(email, subject, buildHtml(email)))
            );

            const ok = results.filter(r => r.status === 'fulfilled').length;
            const ko = results.filter(r => r.status === 'rejected').length;
            console.log(`\n📧 Emails sent: ${ok} OK, ${ko} failed`);
            if (ko > 0) core.warning(`${ko} email(s) failed to send`);