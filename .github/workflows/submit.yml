name: Submit to Production with Fastlane

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to submit to production'
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: 'both'

jobs:
  # ==========================================
  # SUBMIT ANDROID à Production Google Play
  # ==========================================
  submit-android:
    name: 🤖 Submit Android → Production
    if: |
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: � Generate Android native folder
        run: npx expo prebuild --platform android --clean

      - name: 📋 Setup Fastlane configuration
        run: |
          mkdir -p android/fastlane
          cp android-fastlane/Fastfile android/fastlane/Fastfile
          echo "✅ Fastlane configuration copied to android/fastlane/"
          ls -la android/fastlane/

      - name: 🔧 Set gradlew permissions
        working-directory: android
        run: |
          chmod +x gradlew
          echo "✅ Gradlew permissions set"

      - name: 🔧 Generate React Native Codegen artifacts
        working-directory: android
        run: |
          echo "Generating codegen artifacts for all modules..."
          # Generate codegen artifacts for all native modules, not just the app
          ./gradlew generateCodegenArtifactsFromSchema --stacktrace || {
            echo "⚠️ Codegen generation had issues, but continuing..."
            exit 0
          }
          echo "✅ Codegen artifacts generated"

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 🔐 Setup Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/maya-release.keystore
          echo "Keystore created successfully"

      - name: ⚙️ Create gradle.properties
        run: |
          cat << EOF > android/gradle.properties
          MAYA_UPLOAD_STORE_FILE=maya-release.keystore
          MAYA_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MAYA_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MAYA_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}

          # Gradle settings
          org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=true

          # React Native / Hermes settings
          hermesEnabled=true
          newArchEnabled=true
          EOF

      - name: 🔑 Create Google Play service account JSON
        run: |
          mkdir -p android/fastlane
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > android/fastlane/google-play-service-account.json

      - name: 🚀 Deploy to Google Play Production
        working-directory: android
        run: bundle exec fastlane production
        env:
          SUPPLY_JSON_KEY: ./fastlane/google-play-service-account.json

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-production-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: ✅ Android production deployment
        if: success()
        run: |
          echo "✅ Android app successfully deployed to Google Play Production!"
          echo "📱 Check at: https://play.google.com/console/"

  # ==========================================
  # SUBMIT iOS à Production App Store
  # ==========================================
  submit-ios:
    name: 🍎 Submit iOS → App Store
    if: |
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'
    runs-on: macos-15  # macOS 15 has Xcode 16.x

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Select Xcode 16.1
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: 🔨 Generate iOS native folder
        run: npx expo prebuild --platform ios --clean

      - name: 🔧 Fix iOS nullability issues (pre-pods)
        run: |
          if [ -f scripts/fix-ios-nullability.sh ]; then
            chmod +x scripts/fix-ios-nullability.sh
            bash scripts/fix-ios-nullability.sh || echo "⚠️ Pre-pods nullability fix had warnings, continuing..."
          fi
          node scripts/fix-react-native-maps-nullability.js || true
          node scripts/fix-react-native-svg-nullability.js || true

      - name: 🔧 Set iOS deployment target in Xcode project
        run: |
          # Find the Xcode project file dynamically
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "📱 Found Xcode project at: $PROJECT_FILE"
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' "$PROJECT_FILE"
            echo "✅ Set IPHONEOS_DEPLOYMENT_TARGET to 17.0"
            # Verify the change
            echo "🔍 Verification:"
            grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -n 3
          else
            echo "⚠️ Warning: Could not find Xcode project.pbxproj file"
            exit 1
          fi

      - name: 📦 Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install
          echo "✅ CocoaPods dependencies installed"

      - name: 🔧 Fix iOS nullability issues in Pods
        run: |
          if [ -f scripts/fix-ios-nullability.sh ]; then
            chmod +x scripts/fix-ios-nullability.sh
            bash scripts/fix-ios-nullability.sh || echo "⚠️ Post-pods nullability fix had warnings, continuing..."
          fi
          node scripts/fix-react-native-maps-nullability.js || true
          node scripts/fix-react-native-svg-nullability.js || true

      - name: 🔧 Disable Swift 6 strict concurrency checking
        run: |
          PROJECT_FILE=$(find ios -name "project.pbxproj" -type f | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "📱 Disabling strict concurrency checking in: $PROJECT_FILE"
            # Add SWIFT_STRICT_CONCURRENCY = minimal after each buildSettings opening
            awk '/buildSettings = \{/ {print; print "\t\t\t\tSWIFT_STRICT_CONCURRENCY = minimal;"; next}1' "$PROJECT_FILE" > "$PROJECT_FILE.tmp"
            mv "$PROJECT_FILE.tmp" "$PROJECT_FILE"
            echo "✅ Swift strict concurrency checking disabled"
          fi

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 🔐 Setup App Store Connect API Key
        run: |
          mkdir -p ios/fastlane/keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 -d > ios/fastlane/keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ios/fastlane/keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: 📜 Setup Match certificates
        working-directory: ios
        run: bundle exec fastlane match appstore --readonly
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

      - name: 🚀 Deploy to App Store
        working-directory: ios
        run: bundle exec fastlane release
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-production-ipa
          path: ios/*.ipa
          retention-days: 90

      - name: ✅ iOS production deployment
        if: success()
        run: |
          echo "✅ iOS app successfully deployed to App Store!"
          echo "📱 Check at: https://appstoreconnect.apple.com/"

  # ==========================================
  # SUMMARY + EMAIL NOTIFICATION
  # ==========================================
  submit-summary:
    name: 📢 Submission Summary + Email
    needs: [submit-android, submit-ios]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📊 Deployment Summary
        run: |
          echo "======================================"
          echo "🎉 PRODUCTION SUBMISSION COMPLETED"
          echo "======================================"
          echo ""
          echo "Android: ${{ needs.submit-android.result }}"
          echo "iOS: ${{ needs.submit-ios.result }}"
          echo ""
          if [ "${{ needs.submit-android.result }}" == "success" ]; then
            echo "✅ Android: https://play.google.com/console/"
          fi
          if [ "${{ needs.submit-ios.result }}" == "success" ]; then
            echo "✅ iOS: https://appstoreconnect.apple.com/"
          fi
          echo ""
          echo "⚠️  Don't forget to complete the submission in the consoles!"
          echo "======================================"

      - name: 📧 Send production submission email via Resend
        uses: actions/github-script@v7
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANDROID_RESULT: ${{ needs.submit-android.result }}
          IOS_RESULT: ${{ needs.submit-ios.result }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          PLATFORM_INPUT: ${{ github.event.inputs.platform }}
        with:
          script: |
            const https = require('https');

            const androidResult = process.env.ANDROID_RESULT;
            const iosResult = process.env.IOS_RESULT;
            const commitSha = process.env.COMMIT_SHA.substring(0, 7);
            const runId = process.env.RUN_ID;
            const runNumber = process.env.RUN_NUMBER;
            const repo = process.env.REPO;
            const platform = process.env.PLATFORM_INPUT;
            const actionsUrl = `https://github.com/${repo}/actions/runs/${runId}`;

            const iosRan = platform === 'ios' || platform === 'both';
            const androidRan = platform === 'android' || platform === 'both';
            const allSuccess = (!iosRan || iosResult === 'success') && (!androidRan || androidResult === 'success');

            const iosIcon = !iosRan ? '⏭️' : (iosResult === 'success' ? '✅' : '❌');
            const androidIcon = !androidRan ? '⏭️' : (androidResult === 'success' ? '✅' : '❌');
            const iosStatus = !iosRan ? 'SKIPPED' : iosResult.toUpperCase();
            const androidStatus = !androidRan ? 'SKIPPED' : androidResult.toUpperCase();

            const allRecipients = [
              'guillaumel1103@gmail.com',
              'play.castilla@gmail.com',
              'lharoti.pro@gmail.com',
              'mayaconnect2025@gmail.com'
            ];

            const html = `
            <!DOCTYPE html>
            <html><head><meta charset="utf-8"></head>
            <body style="margin:0;padding:0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr><td align="center" style="padding:30px 0;">
                  <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
                         style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <tr><td style="background:${allSuccess
                      ? 'linear-gradient(135deg,#00c853,#009688)'
                      : 'linear-gradient(135deg,#e53935,#d32f2f)'};
                             padding:30px;text-align:center;">
                      <h1 style="color:#fff;margin:0;font-size:22px;">
                        ${allSuccess ? '🚀 Soumission Production réussie !' : '🚨 Soumission Production échouée'}
                      </h1>
                      <p style="color:rgba(255,255,255,0.85);margin:8px 0 0;font-size:14px;">
                        Maya Connect — Submission #${runNumber}
                      </p>
                    </td></tr>

                    <tr><td style="padding:25px 30px;">
                      ${allSuccess ? `
                        <div style="background:#e8f5e9;border-left:4px solid #4caf50;padding:12px 16px;border-radius:6px;margin-bottom:15px;">
                          <strong>🎉 L'app est en cours de review sur les stores !</strong><br/>
                          <span style="font-size:13px;color:#555;">La publication sera effective après validation par Apple / Google.</span>
                        </div>
                      ` : `
                        <div style="background:#ffebee;border-left:4px solid #e53935;padding:12px 16px;border-radius:6px;margin-bottom:15px;">
                          <strong>Action requise :</strong> Vérifiez les logs ci-dessous.
                        </div>
                      `}

                      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                        ${iosRan ? `
                        <tr><td style="padding:8px 10px;background:#f8f9fa;border-radius:6px;">
                          <strong>${iosIcon} iOS → App Store</strong>
                          <span style="float:right;font-weight:600;color:${iosResult === 'success' ? '#34A853' : '#e53935'};">
                            ${iosStatus}
                          </span>
                        </td></tr>
                        <tr><td style="height:6px;"></td></tr>` : ''}
                        ${androidRan ? `
                        <tr><td style="padding:8px 10px;background:#f8f9fa;border-radius:6px;">
                          <strong>${androidIcon} Android → Google Play</strong>
                          <span style="float:right;font-weight:600;color:${androidResult === 'success' ? '#34A853' : '#e53935'};">
                            ${androidStatus}
                          </span>
                        </td></tr>` : ''}
                      </table>

                      <p style="font-size:13px;color:#666;margin-top:15px;">
                        <strong>Commit :</strong> ${commitSha}<br/>
                        <strong>Plateforme :</strong> ${platform}<br/>
                        <strong>Date :</strong> ${new Date().toLocaleString('fr-FR', {timeZone:'Europe/Paris'})}
                      </p>
                    </td></tr>

                    ${allSuccess ? `
                    <tr><td style="padding:10px 30px;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                        ${iosRan ? `<tr><td style="padding:6px 0;">
                          <a href="https://appstoreconnect.apple.com/"
                             style="display:inline-block;padding:10px 20px;background:#007AFF;color:#fff;
                                    text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;">
                            🍎 Voir sur App Store Connect
                          </a>
                        </td></tr>` : ''}
                        ${androidRan ? `<tr><td style="padding:6px 0;">
                          <a href="https://play.google.com/console/"
                             style="display:inline-block;padding:10px 20px;background:#34A853;color:#fff;
                                    text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;">
                            🤖 Voir sur Google Play Console
                          </a>
                        </td></tr>` : ''}
                      </table>
                    </td></tr>` : ''}

                    <tr><td style="padding:15px 30px 25px;text-align:center;">
                      <a href="${actionsUrl}"
                         style="display:inline-block;padding:10px 24px;background:#1a1a2e;color:#fff;
                                text-decoration:none;border-radius:6px;font-size:13px;">
                        📋 Voir les logs GitHub Actions
                      </a>
                    </td></tr>

                    <tr><td style="padding:12px 30px;background:#f8f9fa;text-align:center;
                             font-size:11px;color:#999;border-top:1px solid #eee;">
                      Maya Connect © 2026 · Notification automatique de soumission production
                    </td></tr>
                  </table>
                </td></tr>
              </table>
            </body></html>`;

            async function sendEmail(to) {
              return new Promise((resolve, reject) => {
                const payload = JSON.stringify({
                  from: 'Maya Release <support@maya-appli.fr>',
                  to,
                  subject: allSuccess
                    ? `🚀 Maya soumise en production ! (${platform}) — #${runNumber}`
                    : `🚨 Échec soumission production (${platform}) — #${runNumber}`,
                  html
                });
                const req = https.request({
                  hostname: 'api.resend.com',
                  path: '/emails',
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.RESEND_API_KEY}`
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => {
                    console.log(`→ ${to}: ${res.statusCode} ${data}`);
                    resolve(res.statusCode);
                  });
                });
                req.on('error', reject);
                req.write(payload);
                req.end();
              });
            }

            const results = await Promise.allSettled(allRecipients.map(sendEmail));
            const ok = results.filter(r => r.status === 'fulfilled').length;
            console.log(`📧 Emails sent: ${ok}/${allRecipients.length}`);
